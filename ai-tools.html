<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 圖片生成器 - NUL Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <nav class="gradient-bg p-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🎨 NUL AI Tools</h1>
            <a href="index.html" class="text-white hover:opacity-80">← 返回首頁</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-6 py-12">
        <div class="max-w-2xl mx-auto">
            <!-- Title -->
            <div class="text-center mb-8">
                <h2 class="text-4xl font-bold mb-4">AI 圖片生成器</h2>
                <p class="text-gray-400">輸入描述，立即生成精美圖片</p>
            </div>

            <!-- 成品展示画廊 - 网站自己会推销 -->
            <div class="glass rounded-2xl p-6 mb-8">
                <h3 class="text-xl font-bold mb-4 text-center">🎨 看看我们能生成什么</h3>
                <p class="text-gray-400 text-center text-sm mb-4">点击下方示例查看效果，或直接输入描述生成你的专属图片</p>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                    <div class="relative group cursor-pointer" onclick="setPrompt('A beautiful sunset over the ocean with pink and orange clouds, photorealistic, 4k')">
                        <img src="https://image.pollinations.ai/prompt/A%20beautiful%20sunset%20over%20the%20ocean%20with%20pink%20and%20orange%20clouds,%20photorealistic?width=400&height=400&nologo=true" 
                             class="w-full h-32 object-cover rounded-lg opacity-80 group-hover:opacity-100 transition" alt="日落海景">
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-2 rounded-b-lg">
                            <p class="text-xs text-white">🌅 日落海景</p>
                        </div>
                    </div>
                    <div class="relative group cursor-pointer" onclick="setPrompt('Cute anime girl with blue hair and purple eyes, cherry blossom background, detailed, high quality')">
                        <img src="https://image.pollinations.ai/prompt/Cute%20anime%20girl%20with%20blue%20hair%20and%20purple%20eyes,%20cherry%20blossom%20background?width=400&height=400&nologo=true" 
                             class="w-full h-32 object-cover rounded-lg opacity-80 group-hover:opacity-100 transition" alt="动漫少女">
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-2 rounded-b-lg">
                            <p class="text-xs text-white">🎭 动漫风格</p>
                        </div>
                    </div>
                    <div class="relative group cursor-pointer" onclick="setPrompt('Modern minimalist logo design for tech company, gradient colors, professional, vector style')">
                        <img src="https://image.pollinations.ai/prompt/Modern%20minimalist%20logo%20design%20for%20tech%20company,%20gradient%20colors,%20professional?width=400&height=400&nologo=true" 
                             class="w-full h-32 object-cover rounded-lg opacity-80 group-hover:opacity-100 transition" alt="Logo设计">
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-2 rounded-b-lg">
                            <p class="text-xs text-white">🎨 Logo设计</p>
                        </div>
                    </div>
                    <div class="relative group cursor-pointer" onclick="setPrompt('Elegant product photography of luxury perfume bottle on marble surface, studio lighting, high end commercial')">
                        <img src="https://image.pollinations.ai/prompt/Elegant%20product%20photography%20of%20luxury%20perfume%20bottle%20on%20marble%20surface,%20studio%20lighting?width=400&height=400&nologo=true" 
                             class="w-full h-32 object-cover rounded-lg opacity-80 group-hover:opacity-100 transition" alt="产品图">
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-2 rounded-b-lg">
                            <p class="text-xs text-white">📦 产品摄影</p>
                        </div>
                    </div>
                </div>
                <p class="text-center text-xs text-gray-500">💡 点击上方图片使用同款描述</p>
            </div>

            <!-- Generator Card -->
            <div class="glass rounded-2xl p-8 shadow-2xl">
                <!-- Prompt Input -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">描述你想要生成的圖片</label>
                    <textarea id="prompt" rows="4" 
                        class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500"
                        placeholder="例如：一隻白色的波斯貓坐在窗台上，陽光透過窗戶照在貓咪身上..."></textarea>
                </div>

                <!-- Size Settings -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">寬度</label>
                        <input type="number" id="width" value="512" min="64" max="2048"
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">高度</label>
                        <input type="number" id="height" value="512" min="64" max="2048"
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-purple-500">
                    </div>
                </div>

                <!-- Quick Size Buttons -->
                <div class="flex gap-2 mb-6 flex-wrap">
                    <button onclick="setSize(512,512)" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">512×512</button>
                    <button onclick="setSize(768,512)" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">768×512</button>
                    <button onclick="setSize(512,768)" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">512×768</button>
                    <button onclick="setSize(1024,1024)" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">1024×1024</button>
                </div>

                <!-- Generate Button -->
                <button id="generateBtn" onclick="generateImage()" 
                    class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition transform hover:scale-[1.02]">
                    ✨ 開始生成
                </button>

                <!-- Loading -->
                <div id="loading" class="hidden mt-6 text-center">
                    <div class="spinner mx-auto mb-4"></div>
                    <p id="statusText" class="text-gray-400">準備生成...</p>
                </div>

                <!-- Result -->
                <div id="result" class="hidden mt-6">
                    <img id="resultImage" class="w-full rounded-lg shadow-lg mb-4" alt="生成的圖片">
                    <div class="flex gap-3">
                        <a id="downloadBtn" href="#" target="_blank" 
                            class="flex-1 gradient-bg text-center text-white font-medium py-3 rounded-lg hover:opacity-90 transition">
                            📥 下載圖片
                        </a>
                        <button onclick="copyLink()" 
                            class="flex-1 bg-gray-800 text-white font-medium py-3 rounded-lg hover:bg-gray-700 transition">
                            📋 複製連結
                        </button>
                    </div>
                </div>

                <!-- Error -->
                <div id="error" class="hidden mt-6 p-4 bg-red-900/50 border border-red-500 rounded-lg text-red-200">
                </div>
            </div>

            <!-- Features -->
            <div class="grid grid-cols-3 gap-4 mt-8 text-center">
                <div class="glass rounded-lg p-4">
                    <div class="text-3xl mb-2">⚡</div>
                    <p class="text-sm text-gray-400">1秒出圖</p>
                </div>
                <div class="glass rounded-lg p-4">
                    <div class="text-3xl mb-2">🆓</div>
                    <p class="text-sm text-gray-400">免費試用</p>
                </div>
                <div class="glass rounded-lg p-4">
                    <div class="text-3xl mb-2">�</div>
                    <p class="text-sm text-gray-400">批量優惠</p>
                </div>
            </div>

            <!-- Order Card -->
            <div class="glass rounded-2xl p-6 mt-8">
                <h3 class="text-xl font-bold mb-4 text-center">📦 批量下單服務</h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center p-3 bg-gray-800 rounded-lg">
                        <span>5張圖片</span>
                        <span class="font-bold text-green-400">NT$100</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-gray-800 rounded-lg">
                        <span>20張圖片</span>
                        <span class="font-bold text-green-400">NT$300</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-gray-800 rounded-lg border-2 border-purple-500">
                        <span>100張圖片</span>
                        <span class="font-bold text-green-400">NT$1,000</span>
                    </div>
                </div>
                <a href="mailto:fandi089457@gmail.com?subject=AI圖片訂單&body=我想要訂購AI圖片，數量：「請填寫」張，用途：「請填寫」" 
                   class="block w-full mt-4 bg-green-600 text-white text-center font-bold py-3 rounded-lg hover:bg-green-700 transition">
                    📧 發送訂單
                </a>
                <p class="text-center text-sm text-gray-400 mt-2">或加 LINE：fandi089457</p>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_BASE: 'https://nul-api-proxy.fandi089457.workers.dev',
            POLL_INTERVAL: 3000,
            MAX_ATTEMPTS: 200
        };

        function setSize(w, h) {
            document.getElementById('width').value = w;
            document.getElementById('height').value = h;
        }

        function setPrompt(text) {
            document.getElementById('prompt').value = text;
            document.getElementById('prompt').focus();
            // 滚动到生成器
            document.getElementById('generateBtn').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            const width = parseInt(document.getElementById('width').value);
            const height = parseInt(document.getElementById('height').value);
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const statusText = document.getElementById('statusText');

            if (!prompt) {
                alert('請輸入描述');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';
            loading.classList.remove('hidden');
            result.classList.add('hidden');
            error.classList.add('hidden');
            statusText.textContent = '正在生成，約需 5-10 秒...';

            try {
                // 使用 Cloudflare Worker + FLUX AI
                const response = await fetch(`${CONFIG.API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, width, height })
                });
                
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error || '生成失敗');

                // 直接顯示結果
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                document.getElementById('resultImage').src = data.data.resultUrl;
                document.getElementById('downloadBtn').href = data.data.resultUrl;
                btn.disabled = false;
                btn.textContent = '✨ 再次生成';

            } catch (e) {
                loading.classList.add('hidden');
                error.textContent = '❌ ' + e.message;
                error.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = '✨ 重新生成';
            }
        }

        function copyLink() {
            const url = document.getElementById('resultImage').src;
            navigator.clipboard.writeText(url).then(() => {
                alert('連結已複製！');
            }).catch(() => {
                // 備用方案
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('連結已複製！');
            });
        }
    </script>
</body>
</html>
