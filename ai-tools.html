<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 圖片生成器 - NUL Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <nav class="gradient-bg p-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🎨 NUL AI Tools</h1>
            <a href="index.html" class="text-white hover:opacity-80">← 返回首頁</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-6 py-12">
        <div class="max-w-2xl mx-auto">
            <!-- Title -->
            <div class="text-center mb-8">
                <h2 class="text-4xl font-bold mb-4">AI 圖片生成器</h2>
                <p class="text-gray-400">輸入描述，立即生成精美圖片</p>
            </div>

            <!-- Generator Card -->
            <div class="glass rounded-2xl p-8 shadow-2xl">
                <!-- Prompt Input -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">描述你想要生成的圖片</label>
                    <textarea id="prompt" rows="4" 
                        class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500"
                        placeholder="例如：一隻白色的波斯貓坐在窗台上，陽光透過窗戶照在貓咪身上..."></textarea>
                </div>

                <!-- Size Settings -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">寬度</label>
                        <input type="number" id="width" value="512" min="64" max="2048"
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">高度</label>
                        <input type="number" id="height" value="512" min="64" max="2048"
                            class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:border-purple-500">
                    </div>
                </div>

                <!-- Quick Size Buttons -->
                <div class="flex gap-2 mb-6 flex-wrap">
                    <button onclick="setSize(512,512)" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">512×512</button>
                    <button onclick="setSize(768,512)" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">768×512</button>
                    <button onclick="setSize(512,768)" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">512×768</button>
                    <button onclick="setSize(1024,1024)" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">1024×1024</button>
                </div>

                <!-- Generate Button -->
                <button id="generateBtn" onclick="generateImage()" 
                    class="w-full gradient-bg text-white font-bold py-4 rounded-lg hover:opacity-90 transition transform hover:scale-[1.02]">
                    ✨ 開始生成
                </button>

                <!-- Loading -->
                <div id="loading" class="hidden mt-6 text-center">
                    <div class="spinner mx-auto mb-4"></div>
                    <p id="statusText" class="text-gray-400">準備生成...</p>
                </div>

                <!-- Result -->
                <div id="result" class="hidden mt-6">
                    <img id="resultImage" class="w-full rounded-lg shadow-lg mb-4" alt="生成的圖片">
                    <div class="flex gap-3">
                        <a id="downloadBtn" href="#" target="_blank" 
                            class="flex-1 gradient-bg text-center text-white font-medium py-3 rounded-lg hover:opacity-90 transition">
                            📥 下載圖片
                        </a>
                        <button onclick="copyLink()" 
                            class="flex-1 bg-gray-800 text-white font-medium py-3 rounded-lg hover:bg-gray-700 transition">
                            📋 複製連結
                        </button>
                    </div>
                </div>

                <!-- Error -->
                <div id="error" class="hidden mt-6 p-4 bg-red-900/50 border border-red-500 rounded-lg text-red-200">
                </div>
            </div>

            <!-- Features -->
            <div class="grid grid-cols-3 gap-4 mt-8 text-center">
                <div class="glass rounded-lg p-4">
                    <div class="text-3xl mb-2">⚡</div>
                    <p class="text-sm text-gray-400">快速生成</p>
                </div>
                <div class="glass rounded-lg p-4">
                    <div class="text-3xl mb-2">🆓</div>
                    <p class="text-sm text-gray-400">完全免費</p>
                </div>
                <div class="glass rounded-lg p-4">
                    <div class="text-3xl mb-2">🔒</div>
                    <p class="text-sm text-gray-400">無需登入</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_BASE: 'https://zimage.run/api/z-image',
            POLL_INTERVAL: 3000,
            MAX_ATTEMPTS: 200
        };

        function setSize(w, h) {
            document.getElementById('width').value = w;
            document.getElementById('height').value = h;
        }

        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            const width = parseInt(document.getElementById('width').value);
            const height = parseInt(document.getElementById('height').value);
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const statusText = document.getElementById('statusText');

            if (!prompt) {
                alert('請輸入描述');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';
            loading.classList.remove('hidden');
            result.classList.add('hidden');
            error.classList.add('hidden');

            try {
                // 1. 創建任務
                statusText.textContent = '創建生成任務...';
                const createRes = await fetch(`${CONFIG.API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, width, height })
                });
                const createData = await createRes.json();
                
                if (!createData.success) throw new Error(createData.error);
                const { uuid } = createData.data;

                // 2. 輪詢等待完成
                for (let i = 0; i < CONFIG.MAX_ATTEMPTS; i++) {
                    await new Promise(r => setTimeout(r, CONFIG.POLL_INTERVAL));
                    
                    const statusRes = await fetch(`${CONFIG.API_BASE}/status/${uuid}`);
                    const statusData = await statusRes.json();
                    
                    if (!statusData.success) continue;
                    const status = statusData.data;

                    if (status.status === 'pending') {
                        statusText.textContent = `排隊中，前面還有 ${status.queuePosition} 個任務...`;
                    } else if (status.status === 'processing') {
                        statusText.textContent = `生成中 ${status.progress || 0}%...`;
                    } else if (status.status === 'completed') {
                        // 3. 顯示結果
                        loading.classList.add('hidden');
                        result.classList.remove('hidden');
                        document.getElementById('resultImage').src = status.resultUrl;
                        document.getElementById('downloadBtn').href = status.resultUrl;
                        btn.disabled = false;
                        btn.textContent = '✨ 再次生成';
                        return;
                    } else if (status.status === 'failed') {
                        throw new Error(status.errorMessage || '生成失敗');
                    }
                }
                
                throw new Error('生成超時');
            } catch (e) {
                loading.classList.add('hidden');
                error.textContent = '❌ ' + e.message;
                error.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = '✨ 重新生成';
            }
        }

        function copyLink() {
            const url = document.getElementById('resultImage').src;
            navigator.clipboard.writeText(url).then(() => {
                alert('連結已複製！');
            }).catch(() => {
                // 備用方案
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('連結已複製！');
            });
        }
    </script>
</body>
</html>
